<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="All writings by Harsh Kumar - Brand psychology, marketing strategy, and honest analysis.">
  <title>Writings | Harsh Kumar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,600;1,9..144,700&family=Instrument+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#faf7f2;
      --ink:#16140f;
      --mid:#8a8070;
      --pale:#f0ebe0;
      --warm:#e8e0d0;
      --red:#bf3517;
      --rule:rgba(22,20,15,0.1);
    }
    html{scroll-behavior:smooth;}
    body{
      background:var(--bg);
      color:var(--ink);
      font-family:'Instrument Sans',sans-serif;
      overflow-x:hidden;
      cursor:none;
    }

    .ucursor{
      position:fixed;
      width:18px;height:2px;
      background:var(--ink);
      pointer-events:none;z-index:9999;
      top:0;left:0;
      transition:width 0.2s,background 0.2s;
    }
    .ucursor.hover{width:34px;background:var(--red);}

    body::after{
      content:'';position:fixed;inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events:none;z-index:900;opacity:0.55;
    }

    /* NAV */
    nav{
      position:fixed;top:0;left:0;right:0;z-index:500;
      display:flex;justify-content:space-between;align-items:center;
      padding:1.6rem 3.5rem;
      background:linear-gradient(var(--bg),transparent);
    }
    .nav-sig{
      font-family:'Fraunces',serif;
      font-size:1.1rem;font-weight:300;font-style:italic;
      color:var(--ink);text-decoration:none;letter-spacing:-0.01em;
    }
    .nav-sig strong{font-weight:600;font-style:normal;}
    .nav-links{display:flex;gap:2.8rem;list-style:none;}
    .nav-links a{
      font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;
      color:var(--mid);text-decoration:none;transition:color 0.2s;
    }
    .nav-links a:hover{color:var(--ink);}

    /* HAMBURGER MENU */
    .hamburger{
      display:none;
      flex-direction:column;
      gap:5px;
      cursor:pointer;
      background:none;
      border:none;
      padding:0;
    }
    .hamburger span{
      width:20px;
      height:2px;
      background:var(--ink);
      transition:all 0.3s;
    }
    .hamburger.active span:nth-child(1){transform:rotate(45deg) translate(8px,8px);}
    .hamburger.active span:nth-child(2){opacity:0;}
    .hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(7px,-7px);}

    .nav-menu{
      display:flex;
      position:static;
    }

    /* HEADER */
    header{
      min-height:60vh;
      display:flex;flex-direction:column;justify-content:center;align-items:flex-start;
      padding:8rem 3.5rem 6rem;
      border-bottom:1px solid var(--rule);
    }
    .header-kicker{
      font-size:0.65rem;letter-spacing:0.22em;text-transform:uppercase;
      color:var(--mid);margin-bottom:2rem;
    }
    .header-h{
      font-family:'Fraunces',serif;
      font-size:clamp(2.8rem,5vw,5rem);
      font-weight:600;line-height:1.1;letter-spacing:-0.025em;
      color:var(--ink);margin-bottom:2rem;
      max-width:600px;
    }
    .header-sub{
      font-family:'Instrument Serif',serif;
      font-size:1rem;line-height:1.7;
      color:var(--mid);max-width:500px;
    }

    /* WRITINGS GRID */
    .writings-container{
      padding:3rem 3.5rem;
    }
    .writings-grid{
      display:grid;grid-template-columns:repeat(2,1fr);
      gap:3rem;
      margin-bottom:4rem;
    }
    .writing-card{
      padding:2rem 0;
      border-bottom:1px solid var(--rule);
      text-decoration:none;
      color:inherit;
      transition:opacity 0.2s;
    }
    .writing-card:hover{opacity:0.7;}
    .writing-card:last-child{border-bottom:none;}

    .w-tag{
      font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase;
      color:var(--mid);margin-bottom:0.8rem;display:inline-block;
    }
    .w-title{
      font-family:'Fraunces',serif;
      font-size:1.4rem;font-weight:600;
      line-height:1.3;color:var(--ink);
      margin-bottom:0.8rem;
    }
    .w-excerpt{
      font-family:'Instrument Serif',serif;
      font-size:0.95rem;line-height:1.6;
      color:var(--mid);margin-bottom:1rem;
    }
    .w-meta{
      font-size:0.72rem;letter-spacing:0.1em;
      color:var(--mid);display:flex;gap:1.5rem;
    }

    /* LOAD MORE */
    .load-more{
      text-align:center;padding:2rem;
    }
    .load-btn{
      padding:0.8rem 2rem;
      border:1.5px solid var(--ink);
      background:var(--bg);
      color:var(--ink);
      cursor:pointer;
      font-size:0.72rem;
      letter-spacing:0.1em;
      text-transform:uppercase;
      transition:all 0.2s;
    }
    .load-btn:hover{
      background:var(--ink);
      color:var(--bg);
    }

    /* EMPTY STATE */
    .empty{
      text-align:center;padding:4rem 2rem;
      color:var(--mid);
    }

    /* MOBILE */
    @media(max-width:768px){
      /* NAV - CLEAN WITH HAMBURGER */
      nav{
        position:relative;
        padding:1.2rem 1.4rem;
        flex-direction:row;
        align-items:center;
        justify-content:space-between;
        gap:0;
      }
      
      .nav-sig{
        font-size:0.9rem;
      }
      
      .hamburger{
        display:flex;
      }
      
      .nav-menu{
        display:none;
        position:absolute;
        top:60px;
        left:0;
        right:0;
        flex-direction:column;
        background:var(--bg);
        border-bottom:1px solid var(--rule);
        padding:1.2rem 1.4rem;
        gap:0.8rem;
      }
      
      .nav-menu.active{
        display:flex;
      }
      
      .nav-links{
        flex-direction:column;
        gap:0.6rem;
        width:100%;
      }
      
      .nav-links li{display:block;}
      
      .nav-links a{
        font-size:0.65rem;
        letter-spacing:0.08em;
        display:block;
        padding:0.4rem 0;
      }
      
      /* HEADER - MORE BREATHING ROOM */
      header{
        padding:5rem 1.4rem 2.5rem;
        min-height:auto;
        border-bottom:1px solid var(--rule);
        margin-top:0;
      }
      
      .header-kicker{
        font-size:0.52rem;
        margin-bottom:1rem;
        letter-spacing:0.15em;
        display:block;
      }
      
      .header-h{
        font-size:clamp(1.5rem,5vw,2.2rem);
        margin-bottom:1rem;
        line-height:1.2;
      }
      
      .header-sub{
        font-size:0.82rem;
        line-height:1.65;
        max-width:100%;
      }
      
      /* WRITINGS */
      .writings-container{padding:1.5rem 1.4rem;}
      .writings-grid{
        grid-template-columns:1fr;
        gap:1.8rem;
      }
      .writing-card{padding:1.2rem 0;}
      .w-tag{font-size:0.52rem;margin-bottom:0.7rem;}
      .w-title{font-size:0.95rem;margin-bottom:0.6rem;line-height:1.3;}
      .w-excerpt{font-size:0.8rem;line-height:1.6;margin-bottom:0.8rem;}
      .w-meta{font-size:0.64rem;gap:0.8rem;}
      
      .load-btn{padding:0.6rem 1.4rem;font-size:0.62rem;}
      .load-more{padding:1.5rem 1rem;}
    }
  </style>
  <link rel="stylesheet" href="/editorial.css?v=38">
</head>
<body>

<div class="ucursor" id="uc"></div>

<!-- NAV -->
<nav>
  <a href="/" class="nav-sig"><strong>Harsh</strong> Kumar</a>
  <button class="hamburger" id="hamburger" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="navMenu">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <ul class="nav-links nav-menu" id="navMenu">
    <li><a href="/#about">About</a></li>
    <li><a href="/writings.html">Writings</a></li>
    <li><a href="/#work">Work</a></li>
    <li><a href="/#connect">Find me</a></li>
  </ul>
</nav>

<!-- HEADER -->
<header>
  <p class="header-kicker">Deep dives & analysis</p>
  <h1 class="header-h">All my <em>writings</em> in one place</h1>
  <p class="header-sub">Original articles on brand psychology, marketing strategy, and the honest stuff behind what makes brands stick. Published here first.</p>
</header>

<!-- WRITINGS -->
<div class="writings-container">
  <aside class="reading-index" aria-label="Reading index">
    <p class="index-kicker">Reading Index</p>
    <div class="index-list" id="readingIndex">
      <button class="index-item active" type="button" data-filter="all">
        <span>All Writings</span>
        <strong>...</strong>
      </button>
    </div>
  </aside>
  <div class="archive-main">
    <div class="writings-grid" id="writingsGrid">
      <div class="archive-skeleton" aria-label="Loading writings" aria-live="polite">
        <div class="archive-skeleton-card"><span></span><strong></strong><p></p><small></small></div>
        <div class="archive-skeleton-card"><span></span><strong></strong><p></p><small></small></div>
        <div class="archive-skeleton-card"><span></span><strong></strong><p></p><small></small></div>
        <div class="archive-skeleton-card"><span></span><strong></strong><p></p><small></small></div>
      </div>
    </div>
    <div class="load-more" id="loadMore" style="display:none;">
      <button class="load-btn" type="button">Load more articles</button>
    </div>
  </div>
</div>

<script>
  // Cursor
  const uc = document.getElementById('uc');
  document.addEventListener('mousemove', e => {
    uc.style.transform = `translate(${e.clientX - 9}px, ${e.clientY + 1}px)`;
  });
  document.querySelectorAll('a,button').forEach(el => {
    el.addEventListener('mouseenter', () => uc.classList.add('hover'));
    el.addEventListener('mouseleave', () => uc.classList.remove('hover'));
  });

  // Hamburger Menu
  const hamburger = document.getElementById('hamburger');
  const navMenu = document.getElementById('navMenu');
  
  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('active');
    navMenu.classList.toggle('active');
    hamburger.setAttribute('aria-expanded', String(navMenu.classList.contains('active')));
  });
  
  // Close menu when link clicked
  navMenu.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      hamburger.classList.remove('active');
      navMenu.classList.remove('active');
      hamburger.setAttribute('aria-expanded', 'false');
    });
  });

  // Sanity Integration
  let allWritings = [];
  let currentFilter = 'all';
  let displayedCount = 0;
  const itemsPerPage = 6;

  function escapeHTML(value) {
    return String(value || '').replace(/[&<>"']/g, char => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[char]));
  }

  function normalizeCategory(category) {
    return String(category || 'writing')
      .toLowerCase()
      .replace(/&/g, 'and')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '');
  }

  function contentText(content) {
    if (!Array.isArray(content)) return '';
    return content.map(block => {
      if (block._type !== 'block' || !Array.isArray(block.children)) return '';
      return block.children.map(child => child.text || '').join(' ');
    }).join(' ');
  }

  function stripMarkers(text) {
    return String(text || '').replace(/\[[A-Z]+\]|\[\/[A-Z]+\]/g, ' ').replace(/\s+/g, ' ').trim();
  }

  function readTime(writing) {
    const text = stripMarkers([
      writing?.title,
      writing?.excerpt,
      contentText(writing?.content)
    ].filter(Boolean).join(' '));
    const words = text.split(/\s+/).filter(Boolean).length;
    return Math.max(1, Math.ceil(words / 220));
  }

  function articleHref(slug) {
    return `/article.html?slug=${encodeURIComponent(slug || '')}`;
  }

  function fetchWithTimeout(url, options = {}, timeoutMs = 7000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    return fetch(url, { ...options, signal: controller.signal })
      .finally(() => clearTimeout(timer));
  }

  function updateActiveFilters(filter) {
    document.querySelectorAll('.index-item').forEach(button => {
      button.classList.toggle('active', button.dataset.filter === filter);
    });
  }

  function setFilter(filter) {
    currentFilter = filter;
    displayedCount = 0;
    updateActiveFilters(filter);
    displayWritings();
  }

  function renderReadingIndex() {
    const container = document.getElementById('readingIndex');
    if (!container) return;

    const counts = allWritings.reduce((acc, writing) => {
      const name = writing.category || 'Writing';
      const key = normalizeCategory(name);
      if (!acc[key]) acc[key] = { name, count: 0 };
      acc[key].count += 1;
      return acc;
    }, {});

    const items = [
      { key: 'all', name: 'All Writings', count: allWritings.length },
      ...Object.entries(counts)
        .sort((a, b) => b[1].count - a[1].count)
        .map(([key, value]) => ({ key, ...value }))
    ];

    container.innerHTML = items.map(item => `
      <button class="index-item ${item.key === currentFilter ? 'active' : ''}" type="button" data-filter="${item.key}">
        <span>${escapeHTML(item.name)}</span>
        <strong>${item.count}</strong>
      </button>
    `).join('');

    container.querySelectorAll('.index-item').forEach(button => {
      button.addEventListener('click', () => setFilter(button.dataset.filter));
    });
  }

  async function loadWritings() {
    try {
      const queryString = '*[_type == "writing"] | order(_createdAt desc)';
      const response = await fetchWithTimeout(
        `/api/sanity?query=${encodeURIComponent(queryString)}`,
        {},
        7000
      );
      
      if (!response.ok) throw new Error('Sanity API unavailable');

      const data = await response.json();
      allWritings = data.result || [];
      renderReadingIndex();
      displayWritings();
    } catch (e) {
      console.log('Sanity fetch pending');
      renderReadingIndex();
      document.getElementById('writingsGrid').innerHTML = 
        '<p class="empty">Check back soon for writings...</p>';
    }
  }

  function displayWritings() {
    const filtered = currentFilter === 'all' 
      ? allWritings 
      : allWritings.filter(w => normalizeCategory(w.category) === currentFilter);
    
    const toDisplay = filtered.slice(0, displayedCount + itemsPerPage);
    displayedCount = toDisplay.length;
    
    if (toDisplay.length === 0) {
      document.getElementById('writingsGrid').innerHTML = 
        '<p class="empty">No writings in this category yet</p>';
      document.getElementById('loadMore').style.display = 'none';
      return;
    }

    document.getElementById('writingsGrid').innerHTML = toDisplay.map(w => `
      <a href="${articleHref(w.slug.current)}" class="writing-card">
        <span class="w-tag">${escapeHTML(w.category || 'Writing')}</span>
        <h2 class="w-title">${escapeHTML(w.title)}</h2>
        <p class="w-excerpt">${escapeHTML(w.excerpt || '')}</p>
        <div class="w-meta">
          <span>${new Date(w._createdAt).toLocaleDateString('en-US', {year: 'numeric', month: 'long', day: 'numeric'})}</span>
          <span>${readTime(w)} min read</span>
          <span>Read →</span>
        </div>
      </a>
    `).join('');

    document.getElementById('loadMore').style.display = 
      toDisplay.length < filtered.length ? 'block' : 'none';
  }

  // Load more button
  document.getElementById('loadMore')?.addEventListener('click', () => {
    displayWritings();
  });

  // Initial load
  loadWritings();
</script>

</body>
</html>
