  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#faf7f2;
      --ink:#16140f;
      --mid:#8a8070;
      --pale:#f0ebe0;
      --warm:#e8e0d0;
      --red:#bf3517;
      --rule:rgba(22,20,15,0.1);
    }
    html{scroll-behavior:smooth;}
    body{
      background:var(--bg);
      color:var(--ink);
      font-family:'Instrument Sans',sans-serif;
      overflow-x:hidden;
      cursor:none;
    }

    /* ── CURSOR ── */
    .ucursor{
      position:fixed;
      width:18px;height:2px;
      background:var(--ink);
      pointer-events:none;z-index:9999;
      top:0;left:0;
      transition:width 0.2s,background 0.2s;
    }
    .ucursor.hover{width:34px;background:var(--red);}

    /* ── GRAIN ── */
    body::after{
      content:'';position:fixed;inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events:none;z-index:900;opacity:0.55;
    }

    /* ── NAV ── */
    nav{
      position:fixed;top:0;left:0;right:0;z-index:500;
      display:flex;justify-content:space-between;align-items:center;
      padding:1.6rem 3.5rem;
      background:linear-gradient(var(--bg),transparent);
    }
    .nav-sig{
      font-family:'Fraunces',serif;
      font-size:1.1rem;font-weight:300;font-style:italic;
      color:var(--ink);text-decoration:none;letter-spacing:-0.01em;
    }
    .nav-sig strong{font-weight:600;font-style:normal;}
    .nav-back{
      font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;
      color:var(--mid);text-decoration:none;transition:color 0.2s;
    }
    .nav-back:hover{color:var(--ink);}

    /* ── ARTICLE CONTAINER ── */
    .article-wrapper{
      max-width:720px;margin:0 auto;padding:8rem 3.5rem 6rem;
    }

    .article-meta{
      display:flex;gap:1.2rem;align-items:center;margin-bottom:2rem;
      font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;
      color:var(--mid);
    }
    .article-category{color:var(--red);font-weight:600;}
    .article-date{color:var(--mid);}
    .article-divider{width:1px;height:14px;background:var(--rule);}

    .article-title{
      font-family:'Fraunces',serif;
      font-size:clamp(2.2rem,5vw,3.8rem);
      font-weight:600;line-height:1.1;
      margin-bottom:2rem;letter-spacing:-0.02em;
    }

    .article-excerpt{
      font-size:1.05rem;line-height:1.8;
      color:var(--mid);margin-bottom:3rem;
      font-family:'Instrument Serif',serif;
      max-width:600px;
    }

    .article-content{
      font-size:1rem;line-height:1.85;
      color:var(--ink);
    }

    .article-content p{
      margin-bottom:1.6rem;
      line-height:1.85;
    }

    .article-content h2{
      margin-top:2.5rem;
      margin-bottom:1.5rem;
      line-height:1.2;

    .article-content h3{
      margin-top:2rem;
      margin-bottom:1rem;

    .article-content strong{

    .article-content ul{

    .article-content ol{

    .article-content h2{
      font-family:'Fraunces',serif;

    }

    .article-content h3{
      font-family:'Fraunces',serif;
      font-size:1.3rem;font-weight:600;

    }

    .article-content ul,

    .article-content li{

    .article-content blockquote{

      color:var(--red);text-decoration:underline;

    .article-content a:hover{

    .article-content ul,
    .article-content ol{
      margin:1.6rem 0 1.6rem 2.5rem;

    }

    .article-content li{
      margin-bottom:0.8rem;

    .article-content code{
      background:var(--pale);

    .article-content blockquote{

    .article-footer{
      margin-top:4rem;padding-top:2rem;

    .article-author{
      display:flex;gap:1.5rem;align-items:flex-start;

    .author-text{font-size:0.95rem;line-height:1.7;}

    .author-bio{color:var(--mid);font-size:0.9rem;margin-top:0.4rem;}

      padding:0.8rem 1.6rem;

    .loading{

    .error h2{
      font-family:'Fraunces',serif;

      margin-bottom:1rem;
      font-weight:600;
    }

    .error p{
      font-size:1rem;
      margin-bottom:2.5rem;
      line-height:1.6;
    }

    .error a{
      display:inline-block;
      padding:0.8rem 2rem;
      background:var(--ink);
      color:var(--bg);
      text-decoration:none;
      font-size:0.7rem;
      font-weight:600;
      letter-spacing:0.1em;
      text-transform:uppercase;
      transition:all 0.2s;
    }

    .error a:hover{
      background:var(--red);
      transform:translateY(-2px);
    }

    @media (max-width:640px){
      nav{padding:1.2rem 2rem;}
      .article-wrapper{padding:6rem 2rem 4rem;}
      .article-title{font-size:clamp(1.8rem,5vw,2.5rem);}
    }
  </style>

<body>
  <div class="article-progress" id="articleProgress"></div>

  <!-- NAVIGATION -->
  <nav>
    <a href="/" class="nav-sig"><strong>Harsh</strong> Kumar</a>
    <a href="/writings" class="nav-back">← All writings</a>
  </nav>

  <!-- ARTICLE CONTAINER -->
  <div class="article-wrapper">
    <div id="articleContent">
      <div class="article-skeleton" aria-label="Loading article" aria-live="polite">
        <div class="skeleton-line skeleton-meta"></div>
        <div class="skeleton-line skeleton-title-wide"></div>
        <div class="skeleton-line skeleton-title-mid"></div>
        <div class="skeleton-line skeleton-copy"></div>
        <div class="skeleton-line skeleton-copy-short"></div>
        <div class="skeleton-media"></div>
        <div class="skeleton-line skeleton-body"></div>
        <div class="skeleton-line skeleton-body"></div>
        <div class="skeleton-line skeleton-body-short"></div>
      </div>
    </div>
  </div>

  <script>
    // Parse template markers: [H2]text[/H2], [B]text[/B], etc
    function parseTemplateMarkers(text) {
      if (!text) return text;
      // Parse [H2]...[/H2]
      text = text.replace(/\[H2\](.*?)\[\/H2\]/g, '<h2>$1</h2>');
      // Parse [H3]...[/H3]
      text = text.replace(/\[H3\](.*?)\[\/H3\]/g, '<h3>$1</h3>');
      // Parse [B]...[/B]
      text = text.replace(/\[B\](.*?)\[\/B\]/g, '<strong>$1</strong>');
      // Parse [I]...[/I]
      text = text.replace(/\[I\](.*?)\[\/I\]/g, '<em>$1</em>');
      // Parse [P]...[/P]
      text = text.replace(/\[P\](.*?)\[\/P\]/g, '<p>$1</p>');
      // Parse [CAP]...[/CAP]
      text = text.replace(/\[CAP\](.*?)\[\/CAP\]/g, '<figcaption class="article-image-caption">$1</figcaption>');
      // Parse [UL]...[/UL]
      text = text.replace(/\[UL\](.*?)\[\/UL\]/gs, '<ul>$1</ul>');
      // Parse [OL]...[/OL]
      text = text.replace(/\[OL\](.*?)\[\/OL\]/gs, '<ol>$1</ol>');
      // Parse [LI]...[/LI]
      text = text.replace(/\[LI\](.*?)\[\/LI\]/g, '<li>$1</li>');
      return text;
    }

    const AUTHOR_NAME = 'Harsh Kumar';
    const AUTHOR_HANDLE = '@realharshkumar';
    const WHATSAPP_NUMBER = '916200793954';
    const SITE_URL = 'https://www.realharshkumar.com';
    const DEFAULT_SHARE_IMAGE = `${SITE_URL}/assets/hero-photo.jpg`;
    let currentArticle = null;
    let selectedArticleText = '';

    function escapeHTML(value) {
      return String(value || '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function blockText(block) {
      if (!block || block._type !== 'block' || !Array.isArray(block.children)) return '';
      return block.children.map(child => child.text || '').join(' ');
    }

    function contentText(content) {
      if (!Array.isArray(content)) return '';
      return content.map(blockText).join(' ');
    }

    function stripMarkers(text) {
      return String(text || '')
        .replace(/\[[A-Z]+\]|\[\/[A-Z]+\]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function readTime(article, contentHTML = '') {
      const text = stripMarkers([
        article?.title,
        article?.excerpt,
        contentText(article?.content),
        contentHTML.replace(/<[^>]+>/g, ' ')
      ].filter(Boolean).join(' '));
      const words = text.split(/\s+/).filter(Boolean).length;
      return Math.max(1, Math.ceil(words / 220));
    }

    function getFiledUnder(article) {
      const tags = [];
      const push = value => {
        const clean = String(value || '').trim();
        if (clean && !tags.some(tag => tag.toLowerCase() === clean.toLowerCase())) tags.push(clean);
      };

      push(article?.category);
      if (Array.isArray(article?.tags)) {
        article.tags.forEach(tag => push(typeof tag === 'string' ? tag : tag?.title || tag?.name));
      }
      push('Brand Strategy');
      push('Marketing');
      return tags.slice(0, 5);
    }

    function findPullQuote(article) {
      return String(article?.pullQuote || article?.quote || '').trim();
    }

    function canonicalArticleUrl(articleSlug = slug) {
      return articleSlug ? `${SITE_URL}/writings/${encodeURIComponent(articleSlug)}` : SITE_URL;
    }

    function safePublishedAt(article) {
      const published = article?.publishedAt ? new Date(article.publishedAt) : null;
      const created = article?._createdAt ? new Date(article._createdAt) : null;
      const oneDayFromNow = Date.now() + 24 * 60 * 60 * 1000;
      if (published && !Number.isNaN(published.getTime()) && published.getTime() <= oneDayFromNow) return published;
      if (created && !Number.isNaN(created.getTime())) return created;
      return published && !Number.isNaN(published.getTime()) ? published : null;
    }

    function formatArticleDate(article) {
      const date = safePublishedAt(article);
      return date ? date.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      }) : '';
    }

    function setMeta(selector, attr, value) {
      if (!value) return;
      let element = document.head.querySelector(selector);
      if (!element) {
        element = document.createElement('meta');
        if (selector.includes('property=')) {
          element.setAttribute('property', selector.match(/property="([^"]+)"/)?.[1] || '');
        } else {
          element.setAttribute('name', selector.match(/name="([^"]+)"/)?.[1] || '');
        }
        document.head.appendChild(element);
      }
      element.setAttribute(attr, value);
    }

    function setCanonical(url) {
      let link = document.head.querySelector('link[rel="canonical"]');
      if (!link) {
        link = document.createElement('link');
        link.setAttribute('rel', 'canonical');
        document.head.appendChild(link);
      }
      link.setAttribute('href', url);
    }

    function setArticleJsonLd(article, canonicalUrl, imageUrl, date) {
      let script = document.getElementById('articleJsonLd');
      if (!script) {
        script = document.createElement('script');
        script.type = 'application/ld+json';
        script.id = 'articleJsonLd';
        document.head.appendChild(script);
      }
      const isoDate = safePublishedAt(article)?.toISOString();
      script.textContent = JSON.stringify({
        '@context': 'https://schema.org',
        '@type': 'Article',
        headline: article.title,
        description: article.excerpt || article.title,
        image: imageUrl,
        datePublished: isoDate,
        dateModified: isoDate,
        author: {
          '@type': 'Person',
          name: AUTHOR_NAME,
          url: SITE_URL,
          sameAs: [
            'https://x.com/realharshkumar',
            'https://www.instagram.com/realharshkumar'
          ]
        },
        publisher: {
          '@type': 'Person',
          name: AUTHOR_NAME
        },
        mainEntityOfPage: canonicalUrl
      });
    }

    function updateArticleSeo(article, featuredImageUrl) {
      const articleSlug = article?.slug?.current || slug;
      const canonicalUrl = canonicalArticleUrl(articleSlug);
      const imageUrl = featuredImageUrl ? optimizedImageUrl(featuredImageUrl, 1200, 82) : DEFAULT_SHARE_IMAGE;
      const description = stripMarkers(article.excerpt || article.title || 'Original essay by Harsh Kumar.');
      const title = `${article.title} | Harsh Kumar`;
      document.title = title;
      setCanonical(canonicalUrl);
      setMeta('meta[name="description"]', 'content', description);
      setMeta('meta[property="og:title"]', 'content', article.title);
      setMeta('meta[property="og:description"]', 'content', description);
      setMeta('meta[property="og:url"]', 'content', canonicalUrl);
      setMeta('meta[property="og:image"]', 'content', imageUrl);
      setMeta('meta[property="article:published_time"]', 'content', safePublishedAt(article)?.toISOString());
      setMeta('meta[name="twitter:title"]', 'content', article.title);
      setMeta('meta[name="twitter:description"]', 'content', description);
      setMeta('meta[name="twitter:image"]', 'content', imageUrl);
      setArticleJsonLd(article, canonicalUrl, imageUrl);
    }

    function sanityImageUrlFromRef(ref, projectId, dataset) {
      const imageId = ref.replace('image-', '').replace('-jpg', '.jpg').replace('-png', '.png').replace('-webp', '.webp');
      return `https://cdn.sanity.io/images/${projectId}/${dataset}/${imageId}`;
    }

    function optimizedImageUrl(url, width = 1400, quality = 78) {
      try {
        const imageUrl = new URL(url);
        if (imageUrl.hostname === 'cdn.sanity.io') {
          imageUrl.searchParams.set('auto', 'format');
          imageUrl.searchParams.set('fit', 'max');
          imageUrl.searchParams.set('w', String(width));
          imageUrl.searchParams.set('q', String(quality));
        }
        return imageUrl.toString();
      } catch {
        return url;
      }
    }

    function optimizedSrcSet(url) {
      return [640, 960, 1400].map(width => `${optimizedImageUrl(url, width, width === 640 ? 72 : 76)} ${width}w`).join(', ');
    }

    function imageDimensionAttrs(url) {
      const match = url.match(/-(\d+)x(\d+)\.(?:jpe?g|png|webp|gif)(?:\?|$)/i);
      return match ? ` width="${match[1]}" height="${match[2]}"` : '';
    }
    
    // Support both /article.html?slug=... locally and /writings/... on Vercel.
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const pathSlug = pathParts[pathParts.length - 1]?.replace(/\.html$/, '');
    const slug = new URLSearchParams(window.location.search).get('slug') || pathSlug;

    function fetchWithTimeout(url, options = {}, timeoutMs = 7000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      return fetch(url, { ...options, signal: controller.signal })
        .finally(() => clearTimeout(timer));
    }

    // Fetch article from Sanity by slug
    async function loadArticle() {
      try {
        const PROJECT_ID = 'de2pyr5p';
        const DATASET = 'production';
        const query = `*[_type == "writing" && slug.current == ${JSON.stringify(slug)}][0]`;
        
        const response = await fetchWithTimeout(
          `/api/sanity?query=${encodeURIComponent(query)}`,
          {},
          7000
        );
        
        if (!response.ok) throw new Error('API error');
        
        const data = await response.json();
        const article = data.result;
        
        if (!article) {
          document.getElementById('articleContent').innerHTML = `
            <div class="error">
              <h2>Article not found</h2>
              <p>Sorry, we couldn't find this article.</p>
              <a href="/writings" class="nav-btn">Back to all writings</a>
            </div>
          `;
          return;
        }
        currentArticle = article;

        const date = formatArticleDate(article);

        // Parse simple template code format
        let contentHTML = '';
        
        if (article.content && Array.isArray(article.content)) {
          article.content.forEach(block => {
            if (block._type === 'block') {
              let text = '';
              
              // Get raw text from block
              if (block.children) {
                text = block.children.map(child => child.text || '').join('');
              }
              
              // Parse template codes
              // [H2]Title[/H2]
              text = text.replace(/\[H2\](.*?)\[\/H2\]/g, '<h2>$1</h2>');
              
              // [H3]Subtitle[/H3]
              text = text.replace(/\[H3\](.*?)\[\/H3\]/g, '<h3>$1</h3>');
              
              // [B]Bold text[/B]
              text = text.replace(/\[B\](.*?)\[\/B\]/g, '<strong>$1</strong>');
              
              // [I]Italic text[/I]
              text = text.replace(/\[I\](.*?)\[\/I\]/g, '<em>$1</em>');
              
              // [P]Paragraph[/P]
              text = text.replace(/\[P\](.*?)\[\/P\]/g, '<p>$1</p>');
              
              // [OL]...[/OL] for ordered lists
              text = text.replace(/\[OL\](.*?)\[\/OL\]/gs, '<ol>$1</ol>');
              
              // [UL]...[/UL] for unordered lists
              text = text.replace(/\[UL\](.*?)\[\/UL\]/gs, '<ul>$1</ul>');
              
              // [LI]List item[/LI]
              text = text.replace(/\[LI\](.*?)\[\/LI\]/g, '<li>$1</li>');
              
              // [IMG]url[/IMG]
              text = text.replace(/\[IMG\](.*?)\[\/IMG\]/g, (match, url) => {
                const rawUrl = url.trim();
                return `<figure class="article-image"><img src="${escapeHTML(optimizedImageUrl(rawUrl))}" srcset="${escapeHTML(optimizedSrcSet(rawUrl))}" sizes="(max-width: 768px) 100vw, 720px" alt="Article image"${imageDimensionAttrs(rawUrl)} loading="lazy" decoding="async" />`;
              });
              
              // [CAP]Caption[/CAP]
              text = text.replace(/\[CAP\](.*?)\[\/CAP\]/g, '<figcaption class="article-image-caption">$1</figcaption></figure>');
              
              // [QUOTE]Quote text[/QUOTE]
              text = text.replace(/\[QUOTE\](.*?)\[\/QUOTE\]/g, '<blockquote class="article-pullquote">$1</blockquote>');
              
              // If text has content, add it
              if (text.trim()) {
                contentHTML += text;
              }
            }
          });
        }
        const articleReadTime = readTime(article, contentHTML);
        const pullQuote = findPullQuote(article);
        const filedUnder = getFiledUnder(article);
        const featuredImageUrl = article.image?.asset?._ref ? sanityImageUrlFromRef(article.image.asset._ref, PROJECT_ID, DATASET) : '';

        updateArticleSeo(article, featuredImageUrl);

        // Render article
        document.getElementById('articleContent').innerHTML = `
          <article>
            <div class="article-meta">
              ${article.category ? `<span class="article-category">${escapeHTML(article.category)}</span>` : ''}
              ${article.category && date ? `<div class="article-divider"></div>` : ''}
              ${date ? `<span class="article-date">${date}</span>` : ''}
              ${(article.category || date) ? `<div class="article-divider"></div>` : ''}
              <span class="article-date">${articleReadTime} min read</span>
            </div>
            
            <h1 class="article-title">${escapeHTML(article.title)}</h1>
            
            ${article.excerpt ? `<p class="article-excerpt">${escapeHTML(article.excerpt)}</p>` : ''}
            
            ${article.image && article.image.asset ? `
              <figure class="article-image">
                <img src="${escapeHTML(optimizedImageUrl(featuredImageUrl))}" srcset="${escapeHTML(optimizedSrcSet(featuredImageUrl))}" sizes="(max-width: 768px) 100vw, 720px" alt="${escapeHTML(article.image.alt || 'Article featured image')}"${imageDimensionAttrs(featuredImageUrl)} loading="lazy" decoding="async" />
                ${article.image.caption ? `<figcaption class="article-image-caption">${escapeHTML(article.image.caption)}</figcaption>` : ''}
              </figure>
            ` : ''}

            ${pullQuote ? `<aside class="article-pullquote" aria-label="Pull quote">${escapeHTML(pullQuote)}</aside>` : ''}
            
            <div class="article-content">
              ${contentHTML || '<p>No content available.</p>'}
            </div>

            <div class="article-footer">
              ${filedUnder.length ? `
                <div class="filed-under">
                  <span>Filed under</span>
                  <div>
                    ${filedUnder.map(tag => `<a href="/writings" class="filed-tag">${escapeHTML(tag)}</a>`).join('')}
                  </div>
                </div>
              ` : ''}
              <div class="article-author">
                <div class="author-text">
                  <span class="author-name">Harsh Kumar</span>
                  <span class="author-bio">Brand strategist • Writer • Founder of Bluebee Digital</span>
                </div>
              </div>
              <p class="article-trust">Published first on realharshkumar.com. Source: ${escapeHTML(article.title)} by ${AUTHOR_HANDLE}.</p>
              <div class="article-nav">
                <a href="/writings" class="nav-btn">All writings →</a>
                <a href="/" class="nav-btn">Home →</a>
              </div>
            </div>
          </article>
        `;

      } catch (error) {
        console.error('Error loading article:', error);
        const timedOut = error?.name === 'AbortError';
        document.getElementById('articleContent').innerHTML = `
          <div class="error">
            <h2>${timedOut ? 'Still fetching the essay' : 'Article not available'}</h2>
            <p>${timedOut ? 'The archive is taking longer than usual. Refresh once, or head back to the writings page.' : "We couldn't load this article. It might have been moved or deleted."}</p>
            <a href="/writings">Back to writings</a>
          </div>
        `;
      }
    }

    // Cursor
    const uc = document.getElementById('uc');
    document.addEventListener('mousemove', e => {
      uc.style.transform = `translate(${e.clientX - 9}px, ${e.clientY + 12}px)`;
    });

    document.querySelectorAll('a,button').forEach(el => {
      el.addEventListener('mouseenter', () => {
        uc.classList.add('hover');
        uc.style.background = 'var(--red)';
      });
      el.addEventListener('mouseleave', () => {
        uc.classList.remove('hover');
        uc.style.background = 'var(--ink)';
      });
    });

    function setupArticleProgress() {
      const progress = document.getElementById('articleProgress');
      if (!progress) return;

      const update = () => {
        const max = document.documentElement.scrollHeight - window.innerHeight;
        const amount = max > 0 ? Math.min(100, Math.max(0, (window.scrollY / max) * 100)) : 0;
        progress.style.width = `${amount}%`;
      };

      update();
      window.addEventListener('scroll', update, { passive: true });
      window.addEventListener('resize', update);
    }

    function setupArticleSelectionTools() {
      const toolbar = document.createElement('div');
      toolbar.className = 'selection-toolbar';
      toolbar.setAttribute('aria-hidden', 'true');
      toolbar.innerHTML = `
        <button type="button" data-action="ask">Ask</button>
        <button type="button" data-action="share">Share</button>
      `;

      const modal = document.createElement('div');
      modal.className = 'quote-share-modal';
      modal.setAttribute('aria-hidden', 'true');
      modal.innerHTML = `
        <div class="quote-share-panel" role="dialog" aria-modal="true" aria-label="Share selected quote">
          <button class="quote-close" type="button" aria-label="Close">×</button>
          <div class="quote-preview-card" id="quotePreviewCard">
            <div class="quote-preview-top">
              <div>
                <span class="quote-preview-label">Selected passage</span>
                <strong>${AUTHOR_NAME}</strong>
                <span>${AUTHOR_HANDLE}</span>
              </div>
              <span class="quote-preview-mark">HK</span>
            </div>
            <p class="quote-preview-text" id="quotePreviewText"></p>
            <div class="quote-preview-source">
              <span>Source article</span>
              <strong id="quotePreviewSource"></strong>
              <small>taken from realharshkumar.com</small>
            </div>
          </div>
          <div class="quote-actions">
            <button type="button" id="quoteShareBtn">Share</button>
            <button type="button" id="quoteDownloadBtn">Download</button>
          </div>
        </div>
      `;

      document.body.appendChild(toolbar);
      document.body.appendChild(modal);

      function hideToolbar() {
        toolbar.classList.remove('visible');
        toolbar.setAttribute('aria-hidden', 'true');
      }

      let selectionTimer = 0;
      function queueToolbar(delay = 90) {
        window.clearTimeout(selectionTimer);
        selectionTimer = window.setTimeout(showToolbar, delay);
      }

      function selectedTextFromArticle() {
        const selection = window.getSelection();
        if (!selection || selection.isCollapsed || selection.rangeCount === 0) return '';
        const range = selection.getRangeAt(0);
        const anchor = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
          ? range.commonAncestorContainer
          : range.commonAncestorContainer.parentElement;
        if (!anchor?.closest('.article-wrapper article')) return '';
        return selection.toString().replace(/\s+/g, ' ').trim().slice(0, 420);
      }

      function showToolbar() {
        const selection = window.getSelection();
        selectedArticleText = selectedTextFromArticle();
        if (!selectedArticleText || selectedArticleText.length < 2 || !selection || selection.rangeCount === 0) {
          hideToolbar();
          return;
        }

        const range = selection.getRangeAt(0);
        const rect = range.getBoundingClientRect();
        const fallbackRect = range.getClientRects()[0];
        const activeRect = rect.width || rect.height ? rect : fallbackRect;
        if (!activeRect) {
          hideToolbar();
          return;
        }

        toolbar.classList.add('visible');
        toolbar.setAttribute('aria-hidden', 'false');
        const toolbarWidth = toolbar.offsetWidth || 250;
        const left = Math.min(window.innerWidth - toolbarWidth - 12, Math.max(12, activeRect.left + activeRect.width / 2 - toolbarWidth / 2));
        const top = Math.max(12, activeRect.top + window.scrollY - 56);
        toolbar.style.left = `${left}px`;
        toolbar.style.top = `${top}px`;
      }

      function articleTitle() {
        return currentArticle?.title || document.querySelector('.article-title')?.textContent?.trim() || 'this article';
      }

      function openWhatsAppQuestion() {
        const title = articleTitle();
        const message = `I was reading this article: ${title}\n\nI have a question about this line:\n"${selectedArticleText}"\n\n`;
        const number = WHATSAPP_NUMBER.trim();
        const url = number
          ? `https://wa.me/${number}?text=${encodeURIComponent(message)}`
          : `https://wa.me/?text=${encodeURIComponent(message)}`;
        window.open(url, '_blank', 'noopener');
        hideToolbar();
      }

      function openSharePreview() {
        document.getElementById('quotePreviewText').textContent = `“${selectedArticleText}”`;
        document.getElementById('quotePreviewSource').textContent = articleTitle();
        modal.classList.add('visible');
        modal.setAttribute('aria-hidden', 'false');
        hideToolbar();
      }

      function closeSharePreview() {
        modal.classList.remove('visible');
        modal.setAttribute('aria-hidden', 'true');
      }

      function shareToX() {
        const title = articleTitle();
        const text = `“${selectedArticleText}”\n\nSource: ${title}\n${AUTHOR_HANDLE}`;
        const url = `https://x.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(canonicalArticleUrl())}`;
        window.open(url, '_blank', 'noopener');
      }

      function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
        const words = text.split(/\s+/);
        let line = '';
        let lines = [];

        words.forEach(word => {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = word;
          } else {
            line = test;
          }
        });
        if (line) lines.push(line);

        if (lines.length > maxLines) {
          lines = lines.slice(0, maxLines);
          lines[lines.length - 1] = `${lines[lines.length - 1].replace(/[.,;:!?]*$/, '')}...`;
        }

        lines.forEach((item, index) => ctx.fillText(item, x, y + index * lineHeight));
        return y + lines.length * lineHeight;
      }

      function downloadQuoteCard() {
        const canvas = document.createElement('canvas');
        canvas.width = 1200;
        canvas.height = 675;
        const ctx = canvas.getContext('2d');
        const title = articleTitle();

        ctx.fillStyle = '#17130e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fbf7ef';
        ctx.fillRect(54, 54, 1092, 567);

        ctx.fillStyle = 'rgba(176, 138, 67, 0.12)';
        ctx.fillRect(54, 54, 1092, 567);
        ctx.fillStyle = 'rgba(23, 19, 14, 0.035)';
        for (let y = 82; y < 610; y += 10) ctx.fillRect(54, y, 1092, 1);
        ctx.fillStyle = 'rgba(23, 19, 14, 0.055)';
        for (let x = 88; x < 1130; x += 112) ctx.fillRect(x, 54, 1, 567);

        ctx.strokeStyle = 'rgba(23, 19, 14, 0.18)';
        ctx.lineWidth = 2;
        ctx.strokeRect(78, 78, 1044, 519);
        ctx.strokeStyle = '#8a6d36';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(88, 174);
        ctx.lineTo(1112, 174);
        ctx.stroke();

        ctx.fillStyle = '#8a6d36';
        ctx.font = '600 24px Arial, sans-serif';
        ctx.letterSpacing = '4px';
        ctx.fillText('SELECTED PASSAGE', 98, 116);
        ctx.letterSpacing = '0px';

        ctx.fillStyle = '#17130e';
        ctx.font = '700 44px Georgia, serif';
        ctx.fillText(AUTHOR_NAME, 98, 154);
        ctx.fillStyle = '#74695b';
        ctx.font = '500 25px Arial, sans-serif';
        ctx.fillText(AUTHOR_HANDLE, 400, 154);

        ctx.strokeStyle = '#8a6d36';
        ctx.lineWidth = 3;
        ctx.strokeRect(1018, 94, 72, 72);
        ctx.fillStyle = '#8a6d36';
        ctx.font = '700 34px Georgia, serif';
        ctx.fillText('HK', 1030, 141);

        ctx.fillStyle = '#17130e';
        ctx.font = '600 55px Georgia, serif';
        const quoteBottom = wrapCanvasText(ctx, `“${selectedArticleText}”`, 98, 270, 1000, 66, 4);

        const sourceTop = Math.max(quoteBottom + 48, 500);
        ctx.strokeStyle = 'rgba(23, 19, 14, 0.16)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(98, sourceTop - 28);
        ctx.lineTo(1100, sourceTop - 28);
        ctx.stroke();

        ctx.fillStyle = '#8a6d36';
        ctx.font = '700 20px Arial, sans-serif';
        ctx.fillText('SOURCE ARTICLE', 98, sourceTop);
        ctx.fillStyle = '#17130e';
        ctx.font = '600 25px Georgia, serif';
        wrapCanvasText(ctx, title, 98, sourceTop + 38, 850, 32, 2);
        ctx.fillStyle = '#74695b';
        ctx.font = '500 22px Arial, sans-serif';
        ctx.fillText('taken from realharshkumar.com', 98, 592);

        const link = document.createElement('a');
        link.download = `${slug || 'realharshkumar'}-quote-card.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      }

      toolbar.addEventListener('click', event => {
        const action = event.target.closest('button')?.dataset.action;
        if (action === 'ask') openWhatsAppQuestion();
        if (action === 'share') openSharePreview();
      });

      modal.querySelector('.quote-close').addEventListener('click', closeSharePreview);
      modal.addEventListener('click', event => {
        if (event.target === modal) closeSharePreview();
      });
      document.getElementById('quoteShareBtn').addEventListener('click', shareToX);
      document.getElementById('quoteDownloadBtn').addEventListener('click', downloadQuoteCard);

      document.addEventListener('selectionchange', () => {
        if (modal.classList.contains('visible')) return;
        queueToolbar(160);
      });
      document.addEventListener('pointerup', event => {
        if (event.target instanceof Element && event.target.closest('.selection-toolbar, .quote-share-modal')) return;
        queueToolbar(80);
      });
      document.addEventListener('touchend', event => {
        if (event.target instanceof Element && event.target.closest('.selection-toolbar, .quote-share-modal')) return;
        queueToolbar(220);
      }, { passive: true });
      document.addEventListener('mouseup', event => {
        if (event.target instanceof Element && event.target.closest('.selection-toolbar, .quote-share-modal')) return;
        queueToolbar(40);
      });
      document.addEventListener('keyup', event => {
        if (event.key === 'Escape') {
          hideToolbar();
          closeSharePreview();
        } else {
          queueToolbar(40);
        }
      });
      window.addEventListener('scroll', () => {
        if (window.innerWidth > 700) hideToolbar();
      }, { passive: true });
    }

    // Load article on page load
    setupArticleProgress();
    setupArticleSelectionTools();
    loadArticle();
  </script>
</body>
</html>
